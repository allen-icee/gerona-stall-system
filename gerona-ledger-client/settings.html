<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Setup - Gerona Stall Ledger</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

        <style>
            .toast-enter {
                transform: translateY(-30px);
                opacity: 0;
            }
            .toast-enter-active {
                transform: translateY(0);
                opacity: 1;
                transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .toast-exit {
                transform: translateY(-20px);
                opacity: 0;
                transition: all 0.3s ease;
            }

            .glass {
                backdrop-filter: blur(20px);
                background: rgba(255, 255, 255, 0.95);
            }
        </style>
    </head>

    <body
        class="h-screen flex flex-col items-center justify-center font-sans relative overflow-hidden text-white bg-slate-900"
    >
        <div
            class="absolute inset-0 bg-gradient-to-br from-slate-900 via-blue-900 to-slate-800 -z-30"
        ></div>

        <div
            class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] -z-20"
        ></div>

        <div
            class="absolute inset-0 opacity-5 flex items-center justify-center pointer-events-none -z-10"
        >
            <img
                src="MunicipalityLogo.png"
                alt="Background Overlay"
                class="w-3/4 md:w-1/2 object-contain"
                onerror="this.style.display = 'none'"
            />
        </div>

        <div
            id="toast-container"
            class="absolute top-6 left-0 right-0 flex justify-center z-50 pointer-events-none"
        ></div>

        <div
            class="absolute -top-32 -left-32 w-96 h-96 bg-blue-400/10 rounded-full blur-3xl pointer-events-none"
        ></div>
        <div
            class="absolute -bottom-32 -right-32 w-96 h-96 bg-yellow-400/10 rounded-full blur-3xl pointer-events-none"
        ></div>

        <div
            class="glass p-10 rounded-3xl shadow-[0_25px_70px_rgba(0,0,0,0.3)] max-w-md w-full border border-slate-200 relative z-10 transition-all duration-500 hover:shadow-[0_35px_90px_rgba(0,0,0,0.4)] mx-4"
        >
            <div class="flex items-center justify-center gap-4 mb-8">
                <div
                    class="w-16 h-16 bg-white rounded-full shadow-lg border-2 border-yellow-400 p-1.5"
                >
                    <img
                        src="MunicipalityLogo.png"
                        class="w-full h-full object-contain"
                        onerror="this.style.display = 'none'"
                    />
                </div>
            </div>

            <div class="text-center mb-8">
                <h1 class="text-2xl font-black tracking-tight text-slate-800">
                    Gerona Stall Management
                </h1>
                <p
                    class="text-slate-500 text-sm mt-3 leading-relaxed font-medium"
                >
                    Enter the Host IP Address displayed on the Main Server's
                    Dashboard to establish a secure LAN connection.
                </p>
            </div>

            <div class="space-y-6">
                <div>
                    <label
                        class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2"
                        >Host IP Address</label
                    >

                    <div class="relative group">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-yellow-600 transition"
                        >
                            <iconify-icon
                                icon="solar:server-square-bold-duotone"
                                width="20"
                            ></iconify-icon>
                        </div>

                        <input
                            type="text"
                            id="ipInput"
                            placeholder="e.g. 192.168.1.15"
                            onkeydown="handleEnter(event)"
                            class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-yellow-100 focus:border-yellow-500 focus:bg-white transition-all outline-none text-lg font-mono font-bold text-slate-800 tracking-wider shadow-inner"
                            autofocus
                        />
                    </div>
                </div>

                <button
                    id="connectBtn"
                    onclick="saveAndConnect()"
                    class="w-full flex items-center justify-center gap-2 bg-yellow-500 hover:bg-yellow-600 text-amber-50 font-semibold py-3.5 rounded-lg transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 group"
                >
                    <span id="btnText">Access the System</span>
                    <iconify-icon
                        id="btnIcon"
                        icon="solar:alt-arrow-right-bold-duotone"
                        width="24"
                        class="group-hover:translate-x-1 transition-transform"
                    ></iconify-icon>
                </button>
            </div>

            <div
                class="mt-8 p-4 bg-blue-50 text-blue-800 rounded-xl text-xs font-medium border border-blue-100 flex gap-3 items-start shadow-sm"
            >
                <iconify-icon
                    icon="solar:info-circle-bold-duotone"
                    width="20"
                    class="shrink-0 text-blue-500"
                ></iconify-icon>
                <p>
                    For authorized personnel of the Municipal Government of
                    Gerona only.
                </p>
            </div>
        </div>

        <footer
            class="absolute bottom-6 w-full text-center text-xs text-slate-300 tracking-wide z-10"
        >
            <div>© Allen Icee Dequiros ⊂⁠(⁠≽^•⩊•^≼⁠)⁠つ</div>
            <div class="opacity-70 mt-1">
                Shoutout To My Dearest Beloved Miss
            </div>
        </footer>

        <script>
            const { ipcRenderer } = require("electron");

            ipcRenderer.on("connection-failed", (event, attemptedIp) => {
                showToast(
                    `Could not connect to ${attemptedIp}:8000. Is the server running?`,
                    "error",
                );
                resetButton();
            });

            function showToast(message, type = "error") {
                const container = document.getElementById("toast-container");
                const toast = document.createElement("div");

                const bgColor =
                    type === "error" ? "bg-rose-500" : "bg-emerald-500";
                const icon =
                    type === "error"
                        ? "solar:danger-triangle-bold"
                        : "solar:check-circle-bold";

                toast.className = `flex items-center gap-3 ${bgColor} text-white px-6 py-3 rounded-xl shadow-xl font-bold text-sm toast-enter pointer-events-auto`;
                toast.innerHTML = `
                    <iconify-icon icon="${icon}" width="20"></iconify-icon>
                    ${message}
                `;

                container.appendChild(toast);
                requestAnimationFrame(() => {
                    toast.classList.add("toast-enter-active");
                });

                setTimeout(() => {
                    toast.classList.add("toast-exit");
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            }

            function handleEnter(event) {
                if (event.key === "Enter") saveAndConnect();
            }

            function setLoadingState() {
                const btn = document.getElementById("connectBtn");
                const btnText = document.getElementById("btnText");
                const btnIcon = document.getElementById("btnIcon");
                const input = document.getElementById("ipInput");

                btn.disabled = true;
                btn.classList.add("opacity-80", "cursor-not-allowed");
                input.disabled = true;
                input.classList.add("opacity-50");

                btnText.innerText = "Connecting...";
                btnIcon.setAttribute("icon", "solar:restart-bold");
                btnIcon.classList.add("animate-spin");
                btnIcon.classList.remove("group-hover:translate-x-1");
            }

            function resetButton() {
                const btn = document.getElementById("connectBtn");
                const btnText = document.getElementById("btnText");
                const btnIcon = document.getElementById("btnIcon");
                const input = document.getElementById("ipInput");

                btn.disabled = false;
                btn.classList.remove("opacity-80", "cursor-not-allowed");
                input.disabled = false;
                input.classList.remove("opacity-50");

                btnText.innerText = "Access the System";
                btnIcon.setAttribute(
                    "icon",
                    "solar:alt-arrow-right-bold-duotone",
                );
                btnIcon.classList.remove("animate-spin");
                btnIcon.classList.add("group-hover:translate-x-1");

                input.focus();
            }

            function saveAndConnect() {
                let rawInput = document.getElementById("ipInput").value.trim();
                let cleanIp = rawInput
                    .replace(/^https?:\/\//, "")
                    .split(":")[0]
                    .replace(/\/$/, "");

                const ipv4Regex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/;

                if (ipv4Regex.test(cleanIp) || cleanIp === "localhost") {
                    setLoadingState();
                    ipcRenderer.send("save-ip", cleanIp);
                } else {
                    showToast(
                        "Invalid IP format. Use numbers and dots (e.g. 192.168.1.15).",
                        "error",
                    );
                    document.getElementById("ipInput").focus();
                }
            }
        </script>
    </body>
</html>
